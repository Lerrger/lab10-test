name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with: {python-version: 3.9}
      - name: Install deps
        run: pip install fastapi httpx pytest pytest-cov
      - name: Run tests with coverage threshold
        # Тут магия: --cov-fail-under=80 уронит билд, если покрытие меньше 80%
        run: pytest --cov=app --cov-fail-under=80